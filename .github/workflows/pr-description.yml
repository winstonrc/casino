name: PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate_description:
    name: Generate Pull Request Description
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Check if merge commit
        id: commit_check
        run: |
          parents=$(git log -1 --format=%P)
          if echo "$parents" | grep -q ' '; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate and update PR description
        if: steps.commit_check.outputs.is_merge == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- pr-description: generated -->';
            const existingBody = context.payload.pull_request.body || '';
            const legacyGeneratedBodyPattern = /^# Contents\n\n(?:- .+(?:\n|$))*$/;

            const shouldUpdateBody =
              existingBody.trim() === '' ||
              existingBody.includes(marker) ||
              legacyGeneratedBodyPattern.test(existingBody);

            if (!shouldUpdateBody) {
              core.info('Skipping PR description update because the body appears to have been manually edited.');
              return;
            }

            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const items = commits.data
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `${marker}\n# Contents\n\n${items}`
            });
